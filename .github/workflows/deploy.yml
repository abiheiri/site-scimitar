name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      #
      # Resize oversized images, convert everything to WebP, then remove originals.
      # Master keeps .jpg — production gets the optimized .webp files.
      #
      - name: Optimize and convert images to WebP
        run: |
          sudo apt-get install -y imagemagick webp
          cd images/guitars
          find . -maxdepth 1 -type f \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' \) \
            | sed 's|^\./||' | while read f; do
              [ -f "$f" ] || continue
              # Resize if larger than 1200px on any edge
              max_dim=$(identify -format "%[fx:max(w,h)]" "$f" 2>/dev/null || echo 0)
              if [ "$max_dim" -gt 1200 ]; then
                echo "Resizing $f ($max_dim px -> 1200px max)"
                mogrify -resize 1200x1200\> "$f"
              fi
              # Convert to WebP and delete the original
              cwebp -q 82 "$f" -o "${f%.*}.webp"
              rm "$f"
            done

      #
      # This creates a manifest.js file in the images/guitars directory that lists all the image and video files.
      # The production branch uses this manifest to know which media files to load.
      #
      - name: Generate image manifest
        run: |
          cd images/guitars
          echo "window.GUITAR_IMAGES = [" > manifest.js
          find . -maxdepth 1 -type f \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' -o -iname '*.mp4' -o -iname '*.webp' \) \
            | sed 's|^\./||' | sort | while read f; do
              echo "  \"images/guitars/$f\","
            done >> manifest.js
          echo "];" >> manifest.js

      - name: Deploy to production branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: production
          publish_dir: .
          commit_message: "deploy: ${{ github.event.head_commit.message }}"
